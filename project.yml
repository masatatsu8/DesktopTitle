name: DesktopTitle
options:
  bundleIdPrefix: com.tatsumi
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  DesktopTitle:
    type: application
    platform: macOS
    sources:
      - path: DesktopTitle
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tatsumi.DesktopTitle
        PRODUCT_NAME: DesktopTitle
        INFOPLIST_FILE: DesktopTitle/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: DesktopTitle/DesktopTitle-Bridging-Header.h
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: DesktopTitle/Info.plist
      properties:
        CFBundleName: DesktopTitle
        CFBundleDisplayName: DesktopTitle
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
